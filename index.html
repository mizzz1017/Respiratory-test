<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>呼吸區段互動題庫 v4</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#d8dee9;--accent:#2563eb;--good:#059669;--bad:#dc2626;--warn:#b45309}
*{box-sizing:border-box;-webkit-tap-highlight-color:rgba(37,99,235,.15)}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:#fff;border-bottom:1px solid var(--line);padding:12px;position:sticky;top:0;z-index:3}
h1{font-size:19px;margin:0 0 8px}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
input,select,button{font:inherit}
input,select{padding:10px;border:1px solid var(--line);border-radius:10px;background:white;min-width:0}
.layout{max-width:1180px;margin:14px auto;padding:0 12px;display:grid;grid-template-columns:280px 1fr;gap:14px}
.panel,.card{background:white;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.panel{padding:12px;margin-bottom:12px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stats div{background:#f2f4f7;border-radius:10px;text-align:center;padding:8px}
.stats b{font-size:20px;display:block}
.small{font-size:13px;color:var(--muted)}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;margin:2px;cursor:pointer}
.btn:active,.choice:active{transform:scale(.99)}
.card{padding:15px;margin-bottom:12px}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:4px 8px;background:#f8fafc}
.src{background:#eef2ff;color:#3730a3}.topic{background:#ecfdf5;color:#065f46}
.stem{white-space:pre-wrap;line-height:1.55;font-weight:650;margin:10px 0;font-size:16.5px}
.qimg{max-width:100%;border:1px solid var(--line);border-radius:10px;margin:8px 0;background:#fff}
.choices{display:grid;gap:8px}
.choice{width:100%;text-align:left;border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;cursor:pointer;line-height:1.45}
.choice:hover{border-color:var(--accent);background:#f8fbff}
.choice.correct{border-color:var(--good);background:#ecfdf5}
.choice.wrong{border-color:var(--bad);background:#fef2f2}
.choice.unknown{border-color:var(--warn);background:#fff7ed}
.result{display:none;margin-top:10px;border-radius:12px;padding:11px;line-height:1.55}
.result.good{display:block;background:#ecfdf5;border:1px solid #a7f3d0}
.result.bad{display:block;background:#fef2f2;border:1px solid #fecaca}
.result.unknown{display:block;background:#fff7ed;border:1px solid #fed7aa}
.explain{border-top:1px dashed rgba(0,0,0,.15);margin-top:8px;padding-top:8px;white-space:pre-wrap}
.warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px;margin:8px 0;color:#7c2d12;line-height:1.45}
.pager{text-align:center;margin:16px 0}
@media(max-width:860px){header{position:static}.layout{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.choice{font-size:16px}.card{padding:13px}}
</style>
</head>
<body>
<header>
<h1>呼吸區段互動題庫 v4</h1>
<div class="controls">
<input id="search" placeholder="搜尋關鍵字">
<select id="source"><option value="">全部來源</option></select>
<select id="topic"><option value="">全部主題</option></select>
</div>
</header>

<div class="layout">
<aside>
<div class="panel">
<div class="stats">
<div><b id="s_total">0</b><span class="small">目前題數</span></div>
<div><b id="s_done">0</b><span class="small">已作答</span></div>
<div><b id="s_right">0</b><span class="small">答對</span></div>
<div><b id="s_wrong">0</b><span class="small">答錯</span></div>
<div><b id="s_unknown">0</b><span class="small">不知道</span></div>
<div><b id="s_rate">0%</b><span class="small">正確率</span></div>
</div>
</div>
<div class="panel">
<button class="btn" data-mode="all">全部題</button>
<button class="btn" data-mode="wrong">只練錯題</button>
<button class="btn" data-mode="unknown">只練不知道</button>
<button class="btn" data-mode="unseen">只練未作答</button>
<button class="btn" id="shuffle">隨機排序</button>
<button class="btn" id="reset">清除紀錄</button>
</div>
<div class="panel">
<b>提醒</b>
<div id="warnings" class="small"></div>
</div>
<div class="panel">
<b>各來源未掌握</b>
<div id="bySource" class="small"></div>
</div>
</aside>

<main>
<div id="status" class="small"></div>
<div id="list"></div>
<div class="pager">
<button class="btn" id="prev">上一頁</button>
<span id="pageInfo" class="small"></span>
<button class="btn" id="next">下一頁</button>
</div>
</main>
</div>

<script>
(function(){
"use strict";
const KEY="respQuizV4Records";
let DATA={questions:[],warnings:[]}, QS=[], current=[], page=1, pageSize=10, mode="all", shuffled=false;
const $=id=>document.getElementById(id);
function esc(s){return (s??"").toString().replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
function norm(s){return (s??"").toString().toLowerCase();}
function loadRec(){try{return JSON.parse(localStorage.getItem(KEY)||"{}")||{}}catch(e){return {}}}
function saveRec(){try{localStorage.setItem(KEY,JSON.stringify(records))}catch(e){}}
let records=loadRec();

async function init(){
  try{
    const res=await fetch("quiz_data.json",{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    DATA=await res.json();
    QS=(DATA.questions||[]).map((q,i)=>{q._i=i;return q});
  }catch(e){
    $("list").innerHTML='<div class="warn"><b>讀不到 quiz_data.json。</b><br>請確認 GitHub repo 根目錄同時有 <b>index.html</b> 和 <b>quiz_data.json</b>，而且不要只上傳 ZIP。<br>錯誤：'+esc(e.message)+'</div>';
    return;
  }
  fillFilters();
  bind();
  render();
}
function fillFilters(){
  [...new Set(QS.map(q=>q.source).filter(Boolean))].sort().forEach(v=>{let o=document.createElement("option");o.value=v;o.textContent=v;$("source").appendChild(o)});
  [...new Set(QS.map(q=>q.topic).filter(Boolean))].sort().forEach(v=>{let o=document.createElement("option");o.value=v;o.textContent=v;$("topic").appendChild(o)});
  $("warnings").innerHTML=(DATA.warnings||[]).map(w=>'<div class="warn">'+esc(w)+'</div>').join("");
}
function bind(){
  ["search","source","topic"].forEach(id=>$(id).addEventListener("input",()=>{page=1;render()}));
  document.querySelectorAll("[data-mode]").forEach(b=>b.addEventListener("click",()=>{mode=b.dataset.mode;page=1;render()}));
  $("shuffle").addEventListener("click",()=>{shuffled=true;page=1;render()});
  $("reset").addEventListener("click",()=>{if(confirm("確定清除全部作答紀錄？")){records={};saveRec();render()}});
  $("prev").addEventListener("click",()=>{if(page>1){page--;render();scrollTo(0,0)}});
  $("next").addEventListener("click",()=>{let pages=Math.max(1,Math.ceil(current.length/pageSize)); if(page<pages){page++;render();scrollTo(0,0)}});
  document.addEventListener("click",e=>{
    const b=e.target.closest("button[data-act]");
    if(!b)return;
    const q=QS[Number(b.dataset.i)];
    if(!q)return;
    if(b.dataset.act==="answer") answer(q,b.dataset.k);
    if(b.dataset.act==="unknown") unknown(q);
  });
}
function filtered(){
  const s=$("source").value,t=$("topic").value,q=norm($("search").value);
  let arr=QS.filter(x=>{
    const r=records[x.id];
    if(s&&x.source!==s)return false;
    if(t&&x.topic!==t)return false;
    if(q&&!norm([x.stem,x.source,x.topic,...(x.choices||[]).map(c=>c.text)].join(" ")).includes(q))return false;
    if(mode==="wrong"&&(!r||!r.wrong))return false;
    if(mode==="unknown"&&(!r||!r.unknown))return false;
    if(mode==="unseen"&&r)return false;
    return true;
  });
  if(shuffled){arr=[...arr].sort(()=>Math.random()-.5);shuffled=false}
  return arr;
}
function stats(){
  let done=0,right=0,wrong=0,unk=0,by={};
  QS.forEach(q=>{
    const r=records[q.id]; if(!r)return;
    done++; if(r.correct)right++; if(r.wrong){wrong++; by[q.source]=(by[q.source]||0)+1} if(r.unknown){unk++; by[q.source]=(by[q.source]||0)+1}
  });
  $("s_total").textContent=current.length; $("s_done").textContent=done; $("s_right").textContent=right; $("s_wrong").textContent=wrong; $("s_unknown").textContent=unk;
  $("s_rate").textContent=(right+wrong)?Math.round(right/(right+wrong)*100)+"%":"0%";
  $("bySource").innerHTML=Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([k,v])=>esc(k)+"：未掌握 "+v).join("<br>")||"目前沒有未掌握題";
}
function card(q){
  const img=q.image?'<img class="qimg" loading="lazy" src="'+q.image+'" alt="題目圖片">':"";
  const choices=(q.choices||[]).map(c=>'<button class="choice" data-act="answer" data-i="'+q._i+'" data-k="'+esc(c.key)+'"><b>'+esc(c.key)+'.</b> '+esc(c.text)+'</button>').join("");
  return '<section class="card" id="card_'+q._i+'"><div class="meta"><span class="badge src">'+esc(q.source)+'</span><span class="badge">'+esc(q.number)+'</span><span class="badge topic">'+esc(q.topic)+'</span></div><div class="stem">'+esc(q.stem)+'</div>'+img+'<div class="choices">'+(choices||'<div class="warn">此題選項不完整，請回看原檔。</div>')+'<button class="choice unknown" data-act="unknown" data-i="'+q._i+'"><b>不知道</b>，直接看答案</button></div><div class="result" id="res_'+q._i+'"></div></section>';
}
function render(){
  current=filtered(); stats();
  const pages=Math.max(1,Math.ceil(current.length/pageSize)); if(page>pages)page=pages;
  const part=current.slice((page-1)*pageSize,page*pageSize);
  $("status").textContent="模式："+({all:"全部題",wrong:"只練錯題",unknown:"只練不知道",unseen:"只練未作答"}[mode]||"全部題")+"｜顯示 "+current.length+" 題";
  $("pageInfo").textContent="第 "+page+" / "+pages+" 頁";
  $("list").innerHTML=part.map(card).join("");
  part.forEach(applyRecord);
}
function optionText(q,k){const c=(q.choices||[]).find(x=>x.key===k);return c?c.text:""}
function answer(q,k){
  const ok=!!q.answer&&k===q.answer;
  records[q.id]={choice:k,correct:ok,wrong:!ok,unknown:false,ts:Date.now()};
  saveRec(); applyRecord(q); stats();
}
function unknown(q){
  records[q.id]={choice:"不知道",correct:false,wrong:false,unknown:true,ts:Date.now()};
  saveRec(); applyRecord(q); stats();
}
function applyRecord(q){
  const r=records[q.id]; if(!r)return;
  document.querySelectorAll('#card_'+q._i+' [data-act="answer"]').forEach(b=>{
    if(b.dataset.k===q.answer&&q.answer)b.classList.add("correct");
    if(r.wrong&&b.dataset.k===r.choice)b.classList.add("wrong");
  });
  show(q,r);
}
function show(q,r){
  const div=$("res_"+q._i); if(!div)return;
  const cls=r.unknown?"unknown":(r.correct?"good":"bad");
  div.className="result "+cls;
  const status=r.unknown?"不知道，已看答案":(r.correct?"答對":"答錯");
  const chosen=r.unknown?"你選：不知道，直接看答案":"你選："+esc(r.choice)+" "+esc(optionText(q,r.choice));
  const ans=q.answer||"未標示";
  div.innerHTML='<b>'+status+'</b><br>'+chosen+'<br>正解：'+esc(ans)+' '+esc(optionText(q,ans))+'<div class="explain"><b>詳解</b><br>'+esc(q.explanation||"")+'</div>';
}
init();
})();
</script>
</body>
</html>
